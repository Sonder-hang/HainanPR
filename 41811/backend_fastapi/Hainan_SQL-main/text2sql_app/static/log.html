<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>工作流日志</title>
  <style>
    :root {
      --blue-50:#eff6ff; --blue-100:#dbeafe; --blue-500:#3b82f6; --blue-600:#2563eb; --blue-700:#1d4ed8;
      --slate-500:#64748b; --slate-600:#475569; --slate-800:#1e293b;
      --white:#ffffff; --paper:#f8fafc; --border:#e2e8f0;
      --err:#dc2626; --err-bg:#fef2f2; --ok:#15803d; --ok-bg:#f0fdf4;
      --violet-600:#7c3aed; --violet-bg:#f5f3ff;
    }
    body { margin:0; font-family:"Segoe UI","PingFang SC",system-ui,sans-serif; background:var(--paper); color:var(--slate-800); line-height:1.5; }
    header { background:linear-gradient(90deg,var(--blue-600) 0%,var(--blue-500) 50%,var(--blue-100) 100%); color:var(--white); padding:1rem 1.5rem; border-bottom:3px solid var(--blue-100); }
    h1 { font-size:1.1rem; margin:0; font-weight:600; }
    .nav { margin-top:.45rem; font-size:.85rem; opacity:.95; }
    .nav a { color:var(--white); font-weight:600; }
    main { padding:1rem 1.5rem 2rem; max-width:1000px; margin:0 auto; }
    .live-label { margin-left:.75rem; font-size:.8rem; cursor:pointer; user-select:none; }
    .live-label input { vertical-align:middle; margin-right:.25rem; }
    button.reload { margin-left:.75rem; padding:.35rem .75rem; background:var(--white); color:var(--blue-700); border:1px solid var(--blue-100); border-radius:8px; cursor:pointer; font-weight:600; font-size:.85rem; }
    .req { border:1px solid var(--border); border-radius:12px; margin-bottom:.75rem; background:var(--white); overflow:hidden; box-shadow:0 1px 3px rgba(15,23,42,.06); }
    .req-h { padding:.65rem 1rem; cursor:pointer; display:flex; flex-wrap:wrap; gap:.4rem .8rem; align-items:center; background:var(--blue-50); border-bottom:1px solid var(--border); }
    .req-h:hover { background:var(--blue-100); }
    .ts { color:var(--blue-700); font-size:.82rem; font-weight:600; }
    .req-name { font-weight:700; font-size:.88rem; }
    .req-type { display:inline-block; padding:.1rem .4rem; border-radius:999px; font-size:.68rem; font-weight:700; }
    .type-ratio { background:var(--blue-100); color:var(--blue-700); }
    .type-stat { background:var(--ok-bg); color:var(--ok); }
    .type-analysis { background:var(--violet-bg); color:var(--violet-600); }
    .req-status { font-size:.72rem; font-weight:700; padding:.1rem .4rem; border-radius:4px; }
    .status-ok { background:var(--ok-bg); color:var(--ok); }
    .status-fail { background:var(--err-bg); color:var(--err); }
    .req-mode { display:inline-block; padding:.1rem .4rem; border-radius:999px; font-size:.68rem; font-weight:700; }
    .mode-select { background:#f0f9ff; color:#0369a1; }
    .mode-create { background:#ecfdf5; color:#047857; }
    .mode-edit { background:#fffbeb; color:#b45309; }
    .req-id { font-family:ui-monospace,monospace; font-size:.68rem; color:var(--slate-500); }
    .btn-del { margin-left:auto; flex-shrink:0; padding:.22rem .55rem; font-size:.72rem; border-radius:8px; border:1px solid #fecaca; background:var(--white); color:var(--err); cursor:pointer; font-weight:600; }
    .btn-del:hover { background:#fef2f2; }
    .body { display:none; padding:.85rem 1rem; }
    .body.open { display:block; }

    .wf { position:relative; padding-left:.35rem; }
    .wf::before { content:""; position:absolute; left:11px; top:.5rem; bottom:.5rem; width:3px; background:linear-gradient(180deg,var(--blue-200),var(--blue-100)); border-radius:2px; }
    .wf-step { position:relative; margin-bottom:1rem; padding-left:1.65rem; }
    .wf-step::before { content:""; position:absolute; left:4px; top:.35rem; width:12px; height:12px; border-radius:50%; background:var(--blue-600); border:2px solid var(--white); box-shadow:0 0 0 1px var(--blue-200); z-index:1; }
    .wf-step.wf-fatal::before { background:var(--err); }
    .wf-step.wf-end::before { background:var(--ok); }
    .wf-step-title { font-size:.85rem; font-weight:700; margin:0 0 .35rem; }
    .wf-step-meta { font-size:.7rem; color:var(--slate-500); margin-bottom:.35rem; }

    .wf-summary { background:#f8fafc; border:1px solid var(--border); border-radius:8px; padding:.5rem .65rem; font-size:.8rem; margin-bottom:.4rem; }
    .wf-summary strong { color:var(--slate-800); }

    details.wf-details { margin-bottom:.35rem; border:1px solid var(--border); border-radius:8px; background:var(--white); overflow:hidden; }
    details.wf-details > summary { cursor:pointer; padding:.4rem .55rem; font-size:.76rem; font-weight:600; color:var(--slate-600); background:#f8fafc; list-style:none; user-select:none; }
    details.wf-details > summary::-webkit-details-marker { display:none; }
    details.wf-details > summary::before { content:"▸ "; color:var(--blue-600); }
    details.wf-details[open] > summary::before { content:"▾ "; }
    details.wf-details pre { margin:0; padding:.45rem .55rem; font-size:.66rem; max-height:300px; overflow:auto; white-space:pre-wrap; word-break:break-word; border-top:1px solid var(--border); }

    .sql-block { background:#0f172a; color:#e2e8f0; border-radius:8px; padding:.5rem .55rem; font-size:.66rem; white-space:pre-wrap; word-break:break-word; max-height:200px; overflow:auto; margin:.25rem 0; font-family:ui-monospace,monospace; }
    .result-line { font-size:.8rem; font-weight:600; margin:.3rem 0; }
    .result-ok { color:var(--ok); }
    .result-fail { color:var(--err); }

    .wf-table-scroll { overflow-x:auto; margin-top:.3rem; border-radius:8px; border:1px solid var(--border); background:var(--white); }
    .wf-preview-table { border-collapse:collapse; font-size:.66rem; width:max-content; min-width:100%; }
    .wf-preview-table th, .wf-preview-table td { border:1px solid var(--border); padding:.25rem .4rem; text-align:left; max-width:12rem; word-break:break-word; }
    .wf-preview-table th { background:#e2e8f0; font-weight:700; white-space:nowrap; }
    .wf-preview-table th.th-meaning { white-space:normal; vertical-align:bottom; }
    .wf-preview-table th.th-meaning .th-col { display:flex; flex-direction:column; align-items:flex-start; gap:.1rem; line-height:1.2; }
    .wf-preview-table th.th-meaning .col-en { font-weight:700; font-family:ui-monospace,monospace; font-size:.62rem; }
    .wf-preview-table th.th-meaning .col-cn { font-size:.58rem; color:var(--slate-500); font-weight:500; max-width:14rem; white-space:normal; }
    .wf-end-box { border-radius:10px; padding:.6rem .75rem; font-size:.82rem; margin-top:.25rem; }
    .wf-end-ok { background:var(--ok-bg); border:1px solid #bbf7d0; }
    .wf-end-partial { background:#fffbeb; border:1px solid #fde68a; }
    .err { color:var(--err); }

    .round-sep { display:flex; align-items:center; gap:.5rem; margin:1rem 0 .75rem; padding:.45rem .65rem; background:linear-gradient(90deg,#fef3c7,#fffbeb); border:1px solid #fde68a; border-radius:8px; }
    .round-badge { background:#f59e0b; color:#fff; font-size:.7rem; font-weight:700; padding:.15rem .45rem; border-radius:999px; flex-shrink:0; }
    .round-feedback { font-size:.78rem; color:#92400e; flex:1; word-break:break-word; }
    .round-feedback strong { color:#78350f; }
    .conv-badge { display:inline-block; background:var(--blue-100); color:var(--blue-700); font-size:.65rem; font-weight:700; padding:.1rem .35rem; border-radius:999px; margin-left:.4rem; }
  </style>
</head>
<body>
  <header>
    <h1>工作流日志
      <button type="button" class="reload" id="reload">刷新</button>
      <label class="live-label"><input type="checkbox" id="livePoll" />实时刷新</label>
    </h1>
    <div class="nav"><a href="/">← 返回指标页</a> · 按时间顺序展示请求链路</div>
  </header>
  <main id="main"><div id="logList"><p>加载中…</p></div></main>

  <script>
    function esc(s) { return s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function loadColumnMeanings() {
      try {
        const r = await fetch('/api/column_meanings');
        const j = await r.json();
        window._columnMeanings = j.meanings && typeof j.meanings === 'object' ? j.meanings : {};
      } catch { window._columnMeanings = {}; }
    }

    function colHeaderTh(colName) {
      const m = (window._columnMeanings || {})[colName] || '';
      const en = '<span class="col-en">' + esc(colName) + '</span>';
      const cn = m ? '<span class="col-cn">（' + esc(m) + '）</span>' : '';
      return '<th class="th-meaning"><div class="th-col">' + en + cn + '</div></th>';
    }

    function typeClass(t) {
      if (t === '统计型') return 'type-stat';
      if (t === '大模型分析型') return 'type-analysis';
      return 'type-ratio';
    }

    function renderPreviewTable(cols, rows, err, title) {
      if (err) return `<div class="result-fail">${esc(title || '预览')} — ${esc(err)}</div>`;
      const list = Array.isArray(rows) ? rows : [];
      if (!list.length) return `<div class="wf-step-meta">${esc(title || '预览')}：0 行</div>`;
      const colList = Array.isArray(cols) && cols.length ? cols : Object.keys(list[0] || {});
      const head = colList.map(c => colHeaderTh(c)).join('');
      const body = list.map(r => '<tr>' + colList.map(c => `<td>${esc(r && r[c] != null ? String(r[c]) : '')}</td>`).join('') + '</tr>').join('');
      return `<div style="font-size:.7rem;font-weight:600;margin-top:.4rem;">${esc(title || '预览')}（最多 10 行）</div><div class="wf-table-scroll"><table class="wf-preview-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
    }

    function buildEvents(b) {
      const out = [];
      if (b.run) out.push({ kind:'start', ts:b.run.ts_iso||'', data:b.run });
      (b.llm_rounds||[]).forEach(r => out.push({ kind:'llm', ts:r.ts_iso||'', data:r }));
      if (b.fatal) out.push({ kind:'fatal', ts:b.fatal.ts_iso||'', data:b.fatal });
      if (b.end) out.push({ kind:'end', ts:b.end.ts_iso||'', data:b.end });
      out.sort((a,x) => a.ts < x.ts ? -1 : a.ts > x.ts ? 1 : 0);
      return out;
    }

    function modeClass(m) {
      if (m === '新增指标') return 'mode-create';
      if (m === '编辑指标') return 'mode-edit';
      return 'mode-select';
    }

    function renderStart(row, n, roundIdx) {
      const p = row.payload || {};
      const tables = (p['请求参数']||{}).selected_tables;
      const mode = p['操作模式'] || '';
      const roundLabel = roundIdx > 0 ? ` · 第${roundIdx+1}轮（再生成）` : '';
      return `<div class="wf-step">
        <div class="wf-step-title">步骤 ${n} · 请求开始${roundLabel}</div>
        <div class="wf-summary">
          ${mode ? `<span class="req-mode ${modeClass(mode)}">${esc(mode)}</span> · ` : ''}
          <strong>指标：</strong>${esc(p['指标名']||'—')} · <strong>类型：</strong>${esc(p['指标类型']||'分子分母比值型')}
          ${tables ? ' · <strong>涉及表：</strong>' + esc(JSON.stringify(tables)) : ''}
        </div>
      </div>`;
    }

    function renderLlmDual(row, n) {
      const a = row.attempt;
      const nSql = row['分子解析SQL']||'';
      const dSql = row['分母解析SQL']||'';
      const nc = row['分子sql执行计数'];
      const ne = row['分子sql执行错误'];
      const dc = row['分母sql执行计数'];
      const de = row['分母sql执行错误'];
      const okN = ne == null && nc != null;
      const okD = de == null && dc != null;
      const llmSec = row['llm耗时秒'];
      const timing = llmSec != null ? `LLM ${llmSec}s` : '';

      const previewN = row['分子预览列名'] != null ? renderPreviewTable(row['分子预览列名'], row['分子预览行'], row['分子预览错误'], '分子明细') : '';
      const previewD = row['分母预览列名'] != null ? renderPreviewTable(row['分母预览列名'], row['分母预览行'], row['分母预览错误'], '分母明细') : '';

      const isCache = (row['发给模型的_system提示']||'') === '(cache)';
      const title = isCache ? '缓存命中' : `第 ${a} 轮 LLM`;

      return `<div class="wf-step">
        <div class="wf-step-title">步骤 ${n} · ${esc(title)} ${timing ? '· '+esc(timing) : ''}</div>
        ${!isCache ? `
          <details class="wf-details"><summary>System Prompt</summary><pre>${esc(row['发给模型的_system提示']||'')}</pre></details>
          <details class="wf-details"><summary>User Message</summary><pre>${esc(row['发给模型的用户消息']||'')}</pre></details>
          <details class="wf-details"><summary>模型思考过程</summary><pre>${esc(row['模型思考过程']||'（无）')}</pre></details>
          <details class="wf-details"><summary>模型原文</summary><pre>${esc(row['模型返回的原始全文']||'')}</pre></details>
        ` : ''}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.35rem;">
          <div>
            <div class="result-line ${okN?'result-ok':'result-fail'}">分子 ${okN ? 'COUNT='+nc : '失败'+(ne?' — '+esc(ne):'')}</div>
            ${nSql ? `<div class="sql-block">${esc(nSql)}</div>` : ''}
            ${previewN}
          </div>
          <div>
            <div class="result-line ${okD?'result-ok':'result-fail'}">分母 ${okD ? 'COUNT='+dc : '失败'+(de?' — '+esc(de):'')}</div>
            ${dSql ? `<div class="sql-block">${esc(dSql)}</div>` : ''}
            ${previewD}
          </div>
        </div>
      </div>`;
    }

    function renderLlmRound(row, n) {
      const a = row.attempt;
      const sql = row['解析得到的SQL语句'] || '';
      const cnt = row['sql执行计数'];
      const err = row['sql执行错误'];
      const ok = err == null && cnt != null;
      const llmSec = row['llm耗时秒'];
      const sqlSec = row['sql计数耗时秒'];
      const timing = [llmSec != null ? `LLM ${llmSec}s` : '', sqlSec != null ? `SQL ${sqlSec}s` : ''].filter(Boolean).join(' · ');

      return `<div class="wf-step">
        <div class="wf-step-title">步骤 ${n} · 第 ${a} 轮 LLM（${esc(row.phase||'单SQL')}） ${timing ? '· '+esc(timing) : ''}</div>
        <details class="wf-details"><summary>System Prompt</summary><pre>${esc(row['发给模型的_system提示']||'')}</pre></details>
        <details class="wf-details"><summary>User Message</summary><pre>${esc(row['发给模型的用户消息']||'')}</pre></details>
        <details class="wf-details"><summary>模型思考过程</summary><pre>${esc(row['模型思考过程']||'（无）')}</pre></details>
        <details class="wf-details"><summary>模型原文</summary><pre>${esc(row['模型返回的原始全文']||'')}</pre></details>
        <div class="result-line ${ok?'result-ok':'result-fail'}">${ok ? 'COUNT='+cnt : '执行失败'+(err?' — '+esc(err):'')}</div>
        ${sql ? `<div class="sql-block">${esc(sql)}</div>` : ''}
      </div>`;
    }

    function renderLlmPending(row, n) {
      return `<div class="wf-step" style="border-left:3px solid #f59e0b;padding-left:1.85rem;">
        <div class="wf-step-title" style="color:#b45309;">步骤 ${n} · 等待模型回复 · 第 ${row.attempt} 轮</div>
        <details class="wf-details" open><summary>System Prompt（已发送）</summary><pre>${esc(row['发给模型的_system提示']||'')}</pre></details>
        <details class="wf-details" open><summary>User Message（已发送）</summary><pre>${esc(row['发给模型的用户消息']||'')}</pre></details>
      </div>`;
    }

    function renderFatal(row, n) {
      const p = row.payload || {};
      return `<div class="wf-step wf-fatal">
        <div class="wf-step-title err">步骤 ${n} · 运行异常</div>
        <div class="result-fail" style="font-size:.84rem;">${esc(p['错误信息']||p['错误类型']||'')}</div>
        <details class="wf-details"><summary>完整 traceback</summary><pre>${esc(JSON.stringify(p,null,2))}</pre></details>
      </div>`;
    }

    function renderEnd(row, n) {
      const p = row.payload || {};
      const partial = row.event === 'run_end_partial';
      const lines = [];
      if (p['尝试轮数']) lines.push(`共${p['尝试轮数']}轮`);
      if (p['llm耗时秒'] != null) lines.push(`LLM ${p['llm耗时秒']}s`);
      if (p.numerator_count !== undefined) lines.push(`分子=${p.numerator_count}`);
      if (p.denominator_count !== undefined) lines.push(`分母=${p.denominator_count}`);
      if (p.count !== undefined) lines.push(`记录数=${p.count}`);
      if (p.rate_formula) lines.push(`比率: ${p.rate_formula}`);
      if (p.rate_percent != null) lines.push(`${p.rate_percent}%`);
      if (p.error) lines.push(p.error);

      const sqlParts = [];
      if (p.numerator_sql) sqlParts.push({label:'分子SQL', sql:p.numerator_sql});
      if (p.denominator_sql) sqlParts.push({label:'分母SQL', sql:p.denominator_sql});
      if (p.sql) sqlParts.push({label:'SQL', sql:p.sql});
      if (p['最后分子SQL']) sqlParts.push({label:'最后分子SQL', sql:p['最后分子SQL']});
      if (p['最后分母SQL']) sqlParts.push({label:'最后分母SQL', sql:p['最后分母SQL']});
      if (p['最后SQL']) sqlParts.push({label:'最后SQL', sql:p['最后SQL']});

      return `<div class="wf-step wf-end">
        <div class="wf-step-title">步骤 ${n} · ${partial ? '未通过校验' : '正常结束'}</div>
        <div class="wf-end-box ${partial ? 'wf-end-partial' : 'wf-end-ok'}">
          ${lines.length ? esc(lines.join(' · ')) : '（无摘要）'}
        </div>
        ${sqlParts.map(s => `<details class="wf-details" style="margin-top:.3rem;"><summary>${esc(s.label)}</summary><div class="sql-block" style="border-radius:0 0 8px 8px;">${esc(s.sql)}</div></details>`).join('')}
      </div>`;
    }

    function renderWorkflow(b, roundIdx) {
      const events = buildEvents(b);
      if (!events.length) return '<p class="err">无事件</p>';
      let n = 0;
      return '<div class="wf">' + events.map(e => {
        n++;
        if (e.kind === 'start') return renderStart(e.data, n, roundIdx || 0);
        if (e.kind === 'llm') {
          if (e.data.event === 'llm_dual_pending') return renderLlmPending(e.data, n);
          if (e.data.event === 'llm_dual') return renderLlmDual(e.data, n);
          if (e.data.event === 'llm_round') return renderLlmRound(e.data, n);
          return renderLlmDual(e.data, n);
        }
        if (e.kind === 'fatal') return renderFatal(e.data, n);
        if (e.kind === 'end') return renderEnd(e.data, n);
        return '';
      }).join('') + '</div>';
    }

    function renderConversation(conv) {
      const rounds = conv.rounds || [];
      if (!rounds.length) return '';
      const first = rounds[0];
      const firstRun = first.run && first.run.payload ? first.run.payload : {};
      const ts = firstRun['本次请求时间戳'] || conv.ts_iso || '';
      const name = firstRun['指标名'] || '请求';
      const itype = firstRun['指标类型'] || '分子分母比值型';
      const mode = firstRun['操作模式'] || '';
      const cid = conv.conversation_id || '';
      const totalRounds = rounds.length;

      const last = rounds[rounds.length - 1];
      const endEv = last.end ? last.end.event : '';
      const ok = endEv === 'run_end_ok';
      const hasFatal = rounds.some(r => !!r.fatal);

      let bodyHtml = '';
      rounds.forEach((rnd, idx) => {
        if (idx > 0) {
          const rndRun = rnd.run && rnd.run.payload ? rnd.run.payload : {};
          const fb = rndRun['用户反馈'] || '';
          bodyHtml += `<div class="round-sep">
            <span class="round-badge">第 ${idx + 1} 轮</span>
            <span class="round-feedback">${fb ? '<strong>用户反馈：</strong>' + esc(fb) : '再生成'}</span>
          </div>`;
        }
        bodyHtml += renderWorkflow(rnd, idx);
      });

      const roundsLabel = totalRounds > 1 ? `<span class="conv-badge">${totalRounds} 轮对话</span>` : '';

      return `<div class="req" data-rid="${esc(cid)}">
        <div class="req-h" data-toggle>
          <span class="ts">${esc(ts)}</span>
          ${mode ? `<span class="req-mode ${modeClass(mode)}">${esc(mode)}</span>` : ''}
          <span class="req-name">${esc(name)}</span>
          <span class="req-type ${typeClass(itype)}">${esc(itype)}</span>
          ${roundsLabel}
          ${endEv ? `<span class="req-status ${ok?'status-ok':'status-fail'}">${ok?'成功':'失败'}</span>` : ''}
          ${hasFatal ? '<span class="req-status status-fail">异常</span>' : ''}
          <span class="req-id">${esc(cid.slice(0,8))}</span>
          <button type="button" class="btn-del" data-cid="${esc(cid)}">删除</button>
        </div>
        <div class="body">${bodyHtml}</div>
      </div>`;
    }

    function collectOpen() { const s=new Set(); document.querySelectorAll('.req[data-rid]').forEach(el=>{if(el.querySelector('.body.open'))s.add(el.dataset.rid);}); return s; }
    function restoreOpen(ids) { ids.forEach(rid=>{ document.querySelectorAll('.req[data-rid="'+CSS.escape(rid)+'"] .body').forEach(b=>b.classList.add('open')); }); }

    async function load(opts) {
      const silent = opts && opts.silent;
      const el = document.getElementById('logList');
      const open = silent ? collectOpen() : new Set();
      if (!silent) el.innerHTML = '<p>加载中…</p>';
      try {
        const r = await fetch('/api/logs?max_requests=50');
        const j = await r.json();
        const list = j.requests || [];
        el.innerHTML = list.length ? list.map(renderConversation).join('') : '<p>暂无日志。</p>';
        restoreOpen(open);
      } catch(e) { el.innerHTML = '<p class="err">加载失败: '+esc(e)+'</p>'; }
    }

    document.getElementById('main').addEventListener('click', async ev => {
      const del = ev.target.closest('.btn-del');
      if (del) {
        ev.stopPropagation();
        const cid = del.dataset.cid;
        if (!cid) return;
        if (!confirm('删除该会话全部日志（含所有轮次）？')) return;
        try {
          const r = await fetch('/api/logs/'+encodeURIComponent(cid), {method:'DELETE'});
          if (r.ok) load({silent:false}); else alert('删除失败');
        } catch(e) { alert(e); }
        return;
      }
      const h = ev.target.closest('.req-h');
      if (h) { const body = h.nextElementSibling; if (body) body.classList.toggle('open'); }
    });

    let liveTimer = null;
    document.getElementById('reload').addEventListener('click', ()=>load({silent:false}));
    document.getElementById('livePoll').addEventListener('change', e => {
      if (liveTimer) { clearInterval(liveTimer); liveTimer=null; }
      if (e.target.checked) liveTimer = setInterval(()=>load({silent:true}), 2000);
    });

    (async function () {
      await loadColumnMeanings();
      load({ silent: false });
    })();
  </script>
</body>
</html>
